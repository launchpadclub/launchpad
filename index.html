<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launchpad Platform</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #0b0f19;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* Header Section */
    .header {
      position: relative;
      padding: 20px;
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
    }

    .launch-soon {
      font-size: 1.2rem;
      color: #ffcc00;
      text-align: center;
      margin-top: -20px;
    }

    /* Marquee for moving images */
    .marquee {
      width: 100%;
      overflow: hidden;
      background-color: #1b1f2a;
      padding: 10px 0;
      margin-bottom: 30px;
    }

    .marquee img {
      height: 50px;
      margin: 0 20px;
      animation: scroll 15s linear infinite;
    }

    @keyframes scroll {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    /* Card styles */
    .platform-card {
      background-color: #1b1f2a;
      border: none;
      border-radius: 15px;
      text-align: center;
      padding: 20px;
      transition: transform 0.3s;
    }

    .platform-card:hover {
      transform: scale(1.05);
    }

    .platform-card img {
      width: 80px;
      margin-bottom: 15px;
    }

    .btn-custom {
      background-color: #00ffff;
      color: black;
      border-radius: 20px;
      padding: 10px 20px;
      transition: background 0.3s;
    }

    .btn-custom:hover {
      background-color: #00cccc;
    }
  </style>
</head>
<body>

  <!-- Header Section -->
  <div class="header">Launchpad Platform</div>
  <div class="launch-soon"> </div>

  <!-- Moving Images Section -->
  <div class="marquee d-flex align-items-center justify-content-start">
    <img src="https://postimg.cc/mh2F0r7c" alt="Logo 1">
    <img src="https://postimg.cc/4HJnGWKk" alt="Logo 2">
    <img src="https://postimg.cc/MMJvP6qG" alt="Logo 3">
    <img src="https://postimg.cc/6Tw8CpMj" alt="Logo 4">
  </div>

  <!-- Platforms Section -->
  <div class="container">
    <div class="row gy-4">

      <!-- Magic Eden Card -->
      <div class="col-md-4">
        <div class="platform-card">
          <img src="https://postimg.cc/xJmL8pTX" alt="Magic Eden Logo">
          <h5>Magic Eden</h5>
          <p>Explore the Magic Eden marketplace.</p>
          <button class="btn btn-custom" onclick="openPlatform('https://magiceden.io')">Use Magic Eden</button>
        </div>
      </div>

      <!-- OpenSea Card -->
      <div class="col-md-4">
        <div class="platform-card">
          <img src="https://postimg.cc/fShm97JB" alt="OpenSea Logo">
          <h5>OpenSea</h5>
          <p>Discover NFTs on OpenSea.</p>
          <button class="btn btn-custom" onclick="openPlatform('https://opensea.io')">Use OpenSea</button>
        </div>
      </div>

      <!-- CoinMarketCap Card -->
      <div class="col-md-4">
        <div class="platform-card">
          <img src="https://postimg.cc/0rWJxqCV" alt="CoinMarketCap Logo">
          <h5>CoinMarketCap</h5>
          <p>Check the latest cryptocurrency prices.</p>
          <button class="btn btn-custom" onclick="openPlatform('https://coinmarketcap.com')">Use CoinMarketCap</button>
        </div>
      </div>

    </div>
  </div>

  <!-- Bootstrap JS & Popper.js -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.min.js"></script>

  <script>
    // Open platform function to open a platform within an iframe or new page
    function openPlatform(url) {
      // Here you can customize how the platform opens, like using a modal or iframe
      window.open(url, '_blank');
    }
  </script>

</body>
</html>
