<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launchpad Marketplace</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #0b0f19;
      color: white;
      font-family: Arial, sans-serif;
    }
.spaceship {
    width: 60px;
    height: 60px;
    background-image: url('spaceship.png'); /*<a href='https://postimg.cc/CdGN79hJ' target='_blank'><img src='https://i.postimg.cc/FFqBrQ2t/IMG-Launchpad.jpg' border='0' alt='IMG-Launchpad'/></a> */
    background-size: cover;
    position: absolute;
    transition: transform 0.1s ease;
    pointer-events: none;
}
    /* Card Styles */
    .card {
      background: #1b1f2a;
      border: none;
      border-radius: 15px;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 20px rgba(0, 255, 255, 0.2);
    }

    .card img {
      border-radius: 15px 15px 0 0;
    }

    .btn-custom {
      background-color: #00ffff; /* لون أزرق فاتح */
      color: black;
      border-radius: 25px;
      transition: background 0.3s;
    }

    .btn-custom:hover {
      background-color: #00cccc; /* لون أزرق غامق */
    }

    .nft-grid {
      margin-top: 40px;
    }

    .nft-title {
      text-align: center;
      margin-bottom: 20px;
      font-weight: bold;
      font-size: 2rem;
    }

    .search-bar {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <!-- Header Section -->
  <div class="container text-center py-5">
    <h1 class="mb-4">ApeChain NFT Marketplace</h1>
    <div class="search-bar d-flex justify-content-center">
      <input type="text" id="searchInput" class="form-control w-50" placeholder="Search NFTs...">
    </div>
  </div>

  <!-- NFT Grid Section -->
  <div class="container nft-grid">
    <div class="row row-cols-1 row-cols-md-3 g-4">
      
      <!-- NFT Card Template -->
      <div class="col">
        <div class="card">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Bonus: Jimmy NFT" loading="lazy">
          <div class="card-body text-center">
            <h5 class="card-title">Bonus: Jimmy</h5>
            <p class="card-text">Floor: 84.9 APE | Volume: 99.6K APE</p>
            <button class="btn btn-custom">View Details</button>
          </div>
        </div>
      </div>

      <!-- More NFT Cards -->
      <div class="col">
        <div class="card">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="ApePunks NFT" loading="lazy">
          <div class="card-body text-center">
            <h5 class="card-title">ApePunks</h5>
            <p class="card-text">Floor: 19.5 APE | Volume: 69.4K APE</p>
            <button class="btn btn-custom">View Details</button>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="MoonApes NFT" loading="lazy">
          <div class="card-body text-center">
            <h5 class="card-title">MoonApes</h5>
            <p class="card-text">Floor: 34.2 APE | Volume: 22.1K APE</p>
            <button class="btn btn-custom">View Details</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Bootstrap JS & Popper.js -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.min.js"></script>

  <script>
    // Search Functionality
    document.getElementById('searchInput').addEventListener('input', function () {
      const query = this.value.toLowerCase();
      document.querySelectorAll('.card').forEach(card => {
        const title = card.querySelector('.card-title').textContent.toLowerCase();
        card.parentElement.style.display = title.includes(query) ? 'block' : 'none';
      });
    });
  </script>

</body>
</html>
